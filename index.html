<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebAR Lab - AR Only</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      /* Урьдчилсан харахыг хаах */
      visibility: hidden;
    }

    /* AR товчийг хүчээр харуулах */
    model-viewer::part(ar-button) {
      visibility: visible;
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
    }
  </style>
</head>

<body>
  <model-viewer
    src="office_chair.glb"
    ar
    ar-modes="scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="0.8"
    alt="3D model in AR">
  </model-viewer>
</body>
</html>
