<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebAR Lab - Model Viewer</title>

  <!-- model-viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 12px 16px;
      background: #ffffff;
    }

    model-viewer {
      width: 100vw;
      height: calc(100vh - 72px);
      background: #f5f5f5;
      position: relative;
    }

    /* AR button - TOP RIGHT */
    model-viewer::part(default-ar-button) {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
    }

    .hint {
      color: #444;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h3 style="margin:0;">QR → WebAR Lab</h3>
    <div class="hint">
      3D загварыг эргүүлж, томруулж болно.
      AR товчийг дарж бодит орчинд байрлуулна.
    </div>
  </header>

  <model-viewer
    src="office_chair.glb"
    ios-src="chair.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    ar-placement="floor"
    shadow-intensity="1"
    environment-image="neutral"
    alt="3D model in AR">
  </model-viewer>

</body>
</html>
