<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebAR Lab - Model Viewer</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    header {
      padding: 12px 16px;
      background: #ffffff;
    }
    model-viewer {
      width: 100vw;
      height: calc(100vh - 72px);
      background: #f5f5f5;
    }
    .hint {
      color: #444;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <h3 style="margin:0;">QR → WebAR Lab</h3>
    <div class="hint">
      AR товчийг дарж бодит орчинд байрлуулна.
    </div>
  </header>

  <model-viewer
    src="office_chair.glb"
    ios-src="chair.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    ar-scale="auto"
    ar-placement="floor"
    shadow-intensity="1"
    environment-image="neutral"
    alt="3D model in AR">
    
    <!-- Custom AR button -->
    <button slot="ar-button"
      style="background:#000;color:#fff;
             padding:10px 16px;
             border-radius:8px;
             border:none;
             font-size:14px;">
      📱 AR-д харах
    </button>

  </model-viewer>

</body>
</html>
